api:
  dashboard: true
  insecure: false
entryPoints:
  http:
    address: ":80"
  https:
    address: ":443"
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    filename: /etc/traefik/config.yml
certificatesResolvers:
  letsencrypt:
    acme:
      email: alexander.cieslewicz@gmail.com
      storage: /traefik/var/cloudflare.json
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      caServer: https://acme-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 10
log:
  level: DEBUG