http:
  routers:
    test:
      entryPoints:
        - "https"
      rule: "Host(`test.home.tinymagellanic.cloud`)"
      middlewares:
        - default-headers
      tls:
        certResolver: letsencrypt
      service: test 
  services:
    test:
      loadBalancer:
        servers:
          - url: "http://192.168.110.20"
        passHostHeader: true
  middlewares:
    default-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN

    default-whitelist:
      ipAllowList:
        sourceRange:
        - "10.0.0.0/8"
        - "192.168.0.0/16"
        - "172.16.0.0/12"

    secured:
      chain:
        middlewares:
        - default-whitelist
        - default-headers