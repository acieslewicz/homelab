---
- name: Configure Bind9
  hosts: proxmox_dns

  roles:
    - role: systemli.bind9
      vars:
        bind9_forward: true
        bind9_recursor: true
        bind9_generate_ddns_key: false

        internal_networks:
          - 192.168.0.0/16

        bind9_our_networks: "{{ internal_networks }}"

        bind9_forward_servers:
          - 9.9.9.9
          - 149.112.112.112

        bind9_zones_dynamic:
          - name: home.mymagellanic.cloud
            type: master
            default_ttl: 1d
            primary: home.mymagellanic.cloud
            admin: info.mymagellanic.cloud
            serial: "{{'%Y%m%d01' | strftime }}"

            ns_records:
              - ns.home.mymagellanic.cloud.

            rrs:
              - label: ns
                type: A
                rdata: 192.168.100.10
