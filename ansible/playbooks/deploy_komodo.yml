---
- name: Deploy Komodo with MongoDB using Docker Compose
  hosts: proxmox_komodo
  become: true
  gather_facts: true

  vars:
      docker_users:
          - "{{ lookup('env', 'ANSIBLE_REMOTE_USER') }}"
      docker_install_compose_plugin: true

  pre_tasks:
      - name: Ensure group "docker" exists with correct gid
        group:
            name: docker
            state: present
            gid: 989

  roles:
      - geerlingguy.docker
      - role: komodo
        vars:
            version: latest
            local_auth: true
            db_password: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.database_password) }}"
            komodo_passkey: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.passkey) }}"
            webhook_secret: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.webhook_secret) }}"
            first_server: "https://periphery:8120"
            timezone: "America/Denver"
            host: "https://komodo.home.tinymagellanic.cloud"
            git_providers:
                - domain: "github.com"
                  accounts:
                      - username: "acieslewicz"
                        token: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.homelab_repo_access_token) }}"
