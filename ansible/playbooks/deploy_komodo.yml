---
- name: Deploy Komodo with MongoDB using Docker Compose
  hosts: proxmox_komodo
  become: yes
  gather_facts: yes
  
  vars:
    komodo_dir: /opt/komodo
    komodo_compose_file: "{{ komodo_dir }}/mongo.compose.yaml"
    komodo_env_file: "{{ komodo_dir }}/compose.env"
    
    komodo_config:
      compose_komodo_image_tag: "latest"

      backups_path: "/etc/komodo/backups"
      
      komodo_db_username: "admin"
      komodo_db_password: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.database_password) }}"
      komodo_passkey: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.passkey) }}"

      timezone: "America/Denver"

      #=-------------------------=#
      #= Komodo Core Environment =#
      #=-------------------------=#
      komodo_host: "https://komodo.home.tinymagellanic.cloud"
      komodo_title: Komodo
      komodo_first_server: "https://periphery:8120"
      komodo_disable_confirm_dialog: false
      
      komodo_monitoring_interval: "15-sec"
      komodo_resource_poll_interval: "1-hr"
      
      komodo_webhook_secret: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.webhook_secret) }}"
      komodo_jwt_secret: "{{ lookup('bitwarden.secrets.lookup', komodo_secrets.jwt_secret) }}"
      komodo_jwt_ttl: "1-day"
      
      komodo_local_auth: true
      komodo_disable_user_registration: false
      komodo_enable_new_users: false
      komodo_disable_non_admin_create: false
      komodo_transparent_mode: false
      
      komodo_logging_pretty: false
      komodo_pretty_startup_config: false
      
      komodo_oidc_enabled: false
      komodo_github_oauth_enabled: false
      komodo_google_oauth_enabled: false

      komodo_aws_access_key_id: ""
      komodo_aws_secret_access_key: ""
      
      #=------------------------------=#
      #= Komodo Periphery Environment =#
      #=------------------------------=#
      periphery_root_directory: "/etc/komodo"
      periphery_disable_terminals: false
      periphery_ssl_enabled: true
      periphery_include_disk_mounts: "/etc/hostname"
      periphery_logging_pretty: false
      periphery_pretty_startup_config: false
      
  tasks:
    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create Komodo directory
      file:
        path: "{{ komodo_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Download mongo.compose.yaml
      get_url:
        url: "https://raw.githubusercontent.com/moghtech/komodo/main/compose/mongo.compose.yaml"
        dest: "{{ komodo_compose_file }}"
        mode: '0644'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        force: yes

    - name: Generate compose.env file from template
      template:
        src: komodo_compose.env.j2
        dest: "{{ komodo_env_file }}"
        mode: '0600'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Create Periphery root directory
      file:
        path: "{{ komodo_config.periphery_root_directory }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Deploy Komodo with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ komodo_dir }}"
        project_name: komodo
        files:
          - mongo.compose.yaml
        env_files:
          - compose.env
        state: present
        recreate: auto

    - name: Get container status
      community.docker.docker_container_info:
        name: komodo
      register: container_status

    - name: Print information about container
      debug:
        var: container_status.container
      when: container_status.exists