      3336356661663139373834646135633566653863363162326336

  roles:
    - update
    - hifis.toolkit.unattended_upgrades

  tasks:
    - name: Create Cloudflare CA
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/access/gateway_ca"
        method: POST
        headers:
          Authorization: "Bearer {{ cloudflare_ca_token }}"
        status_code:
          - 201
          - 409

    - name: Get Cloudflare SSH CA Key if creation failed
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/access/gateway_ca"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_ca_token }}"
      register: ca_pk_response

    - name: Save the SSH CA public key
      ansible.builtin.copy:
        content: "{{ ca_pk_response.json.result.public_key }}"
        dest: /etc/ssh/ca.pub
        mode: "0644"

    - name: Configure SSH server
      ansible.builtin.replace:
        path: /etc/ssh/sshd_config
        regexp: "^#PubkeyAuthentication yes"
        replace: "PubkeyAuthentication yes\\nTrustedUserCAKeys /etc/ssh/ca.pub"

    - name: Restart SSH service
      ansible.builtin.systemd:
        name: sshd
        state: restarted
