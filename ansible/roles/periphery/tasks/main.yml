---
- name: Ensure Docker is running
  ansible.builtin.service:
      name: docker
      state: started
      enabled: yes

- name: Create Komodo directory
  ansible.builtin.file:
      path: "{{ komodo_dir }}"
      state: directory
      mode: "0755"
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"

- name: Create Periphery root directory
  ansible.builtin.file:
      path: "{{ root_directory }}"
      state: directory
      mode: "0755"
      owner: root
      group: root

- name: Create compose file from template
  ansible.builtin.template:
      src: periphery.compose.yaml.j2
      dest: "{{ komodo_dir }}/{{ compose_file }}"
      mode: "0600"
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"

- name: Deploy Periphery with Docker Compose
  community.docker.docker_compose_v2:
      project_src: "{{ komodo_dir }}"
      project_name: periphery
      files:
          - "{{ compose_file }}"
      pull: always
      state: present
      recreate: always

- name: Get container status
  community.docker.docker_container_info:
      name: periphery
  register: container_status

- name: Print information about container
  ansible.builtin.debug:
      var: container_status.container
  when: container_status.exists
