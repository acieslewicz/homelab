- name: Ensure Docker is running
  service:
      name: docker
      state: started
      enabled: yes

- name: Create Komodo directory
  file:
      path: "{{ komodo_dir }}"
      state: directory
      mode: "0755"
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"

- name: Generate compose environment file from template
  template:
      src: komodo.compose.env.j2
      dest: "{{ komodo_dir }}/{{ env_file }}"
      mode: "0600"
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"

- name: Create compose file from template
  ansible.builtin.template:
      src: komodo.compose.yaml.j2
      dest: "{{ komodo_dir }}/{{ compose_file }}"
      mode: "0600"
      owner: "{{ ansible_user }}"
      group: "{{ ansible_user }}"

- name: Deploy Komodo with Docker Compose
  community.docker.docker_compose_v2:
      project_src: "{{ komodo_dir }}"
      project_name: komodo
      files:
          - "{{ compose_file }}"
      env_files:
          - "{{ env_file }}"
      pull: always
      state: present
      recreate: always

- name: Get container status
  community.docker.docker_container_info:
      name: komodo
  register: container_status

- name: Print information about container
  debug:
      var: container_status.container
  when: container_status.exists
